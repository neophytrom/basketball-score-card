<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div>
                <h3>HOME</h3>
                <h2 id="count-el"class="score">0</h2>
           
                <button id="one-btn" onclick="plusOne()">+1</button>
                <button id="two-btn" onclick="plusTwo()">+2</button>
                <button id="three-btn" onclick="plusThree()">+3</button>
                <p id="previous-entries">previous entries:</p>
            </div>

                
            <div>
                <h3>AWAY</h3>
                <h2 id="increment-el"class="score">0</h2>
           
                <button id="nowa-btn" onclick="plusNowa()">+1</button>
                <button id="niwa-btn" onclick="plusNiwa()">+2</button>
                <button id="nigo-btn" onclick="plusNigo()">+3</button>
                <p id="pre-entries">previous entries:</p>
            </div>    
        </div>
        <script src="index.js"></script>
    </body>
</html>
